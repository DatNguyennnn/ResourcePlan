databases:
  - name: hr-postgres
    plan: free
    databaseName: hr_management

services:
  - type: web
    name: hr-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hr-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://hr-frontend-y866.onrender.com"]'
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: "8000"
    healthCheckPath: /api/health

  - type: web
    name: hr-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hr-backend-7sxc.onrender.com
      - key: PORT
        value: "3000"
